name: Deploy Backend

# Triggered by starstalk CI via repository_dispatch — receives only the
# image tag, never source code. All deploy secrets live here, not in starstalk.
#
# Also supports workflow_dispatch for manual re-deploys (e.g. rollback).
#
# Event types:
#   deploy-dev        → v1 Go backend, starstalk-dev namespace
#   deploy-prod       → v1 Go backend, starstalk namespace
#   deploy-dev-v2     → v2 Rust backend, starstalk-dev namespace
#   deploy-prod-v2    → v2 Rust backend, starstalk namespace
#
# Security notes:
#   - Only repository_dispatch (authenticated PAT) and workflow_dispatch can trigger this.
#   - pull_request is intentionally NOT a trigger — fork PRs cannot steal secrets.
#   - Self-hosted runner access is gated by the trigger restrictions above.
#   - Source code never enters this workflow; only the image tag crosses the boundary.

on:
  repository_dispatch:
    types: [deploy-dev, deploy-prod, deploy-dev-v2, deploy-prod-v2]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod, dev-v2, prod-v2]
      image_tag:
        description: 'Image tag to deploy (e.g. dev, v1.2.3)'
        required: true
        type: string

# ── Resolve inputs (works for both trigger types) ─────────────────────────────

env:
  TARGET_ENV: ${{ github.event.client_payload.environment || inputs.environment }}
  IMAGE_TAG:  ${{ github.event.client_payload.image_tag  || inputs.image_tag }}

jobs:
  # ── Deploy to dev (auto, no approval) ───────────────────────────────────────
  deploy-dev:
    if: >
      (github.event_name == 'repository_dispatch' && github.event.action == 'deploy-dev') ||
      (github.event_name == 'workflow_dispatch'   && inputs.environment == 'dev')
    runs-on: [self-hosted, proxmox]
    environment:
      name: dev
      url: https://api-dev.starstalk.io

    steps:
      - name: Checkout ai_infra (Helm charts only — no private code)
        uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG_HOMELAB }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Refresh Vault credentials in starstalk-dev
        env:
          # Dev AppRole (secret/starstalk-dev → ENVIRONMENT=dev, PORT=8080).
          # If VAULT_DEV_ROLE_ID is not set, falls back to prod AppRole creds.
          # Run scripts/setup-vault-dev-path.sh on Vault VM then add:
          #   VAULT_DEV_ROLE_ID and VAULT_DEV_SECRET_ID to GitHub Secrets.
          VAULT_ROLE_ID:       ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID:     ${{ secrets.VAULT_SECRET_ID }}
          VAULT_DEV_ROLE_ID:   ${{ secrets.VAULT_DEV_ROLE_ID }}
          VAULT_DEV_SECRET_ID: ${{ secrets.VAULT_DEV_SECRET_ID }}
        run: |
          # Use dev-specific AppRole if available, otherwise use prod AppRole
          DEV_ROLE_ID="${VAULT_DEV_ROLE_ID:-${VAULT_ROLE_ID}}"
          DEV_SECRET_ID="${VAULT_DEV_SECRET_ID:-${VAULT_SECRET_ID}}"

          kubectl create secret generic starstalk-vault-dev \
            --from-literal=VAULT_ROLE_ID="${DEV_ROLE_ID}" \
            --from-literal=VAULT_SECRET_ID="${DEV_SECRET_ID}" \
            --namespace starstalk-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy → dev
        run: |
          helm upgrade --install starstalk-dev helm/starstalk \
            --namespace starstalk-dev \
            --set "image.tag=${{ env.IMAGE_TAG }}" \
            -f helm/starstalk/values-dev.yaml \
            --wait --timeout 3m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/starstalk-dev -n starstalk-dev --timeout=120s
          kubectl get pods -n starstalk-dev -o wide

  # ── Deploy to prod (manual approval required) ────────────────────────────────
  deploy-prod:
    if: >
      (github.event_name == 'repository_dispatch' && github.event.action == 'deploy-prod') ||
      (github.event_name == 'workflow_dispatch'   && inputs.environment == 'prod')
    runs-on: [self-hosted, proxmox]
    environment:
      name: prod
      url: https://api.starstalk.io

    steps:
      - name: Checkout ai_infra (Helm charts only — no private code)
        uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG_HOMELAB }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Refresh Vault credentials in starstalk
        env:
          VAULT_ROLE_ID:    ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID:  ${{ secrets.VAULT_SECRET_ID }}
        run: |
          kubectl create secret generic starstalk-vault \
            --from-literal=VAULT_ROLE_ID="${VAULT_ROLE_ID}" \
            --from-literal=VAULT_SECRET_ID="${VAULT_SECRET_ID}" \
            --namespace starstalk \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy → prod
        run: |
          helm upgrade --install starstalk helm/starstalk \
            --namespace starstalk \
            --set "image.tag=${{ env.IMAGE_TAG }}" \
            -f helm/starstalk/values-homelab.yaml \
            --wait --timeout 3m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/starstalk -n starstalk --timeout=120s
          kubectl get pods -n starstalk -o wide

  # ── Deploy v2 (Rust) to dev (auto, no approval) ──────────────────────────────
  deploy-dev-v2:
    if: >
      (github.event_name == 'repository_dispatch' && github.event.action == 'deploy-dev-v2') ||
      (github.event_name == 'workflow_dispatch'   && inputs.environment == 'dev-v2')
    runs-on: [self-hosted, proxmox]
    environment:
      name: dev
      url: https://api-dev-v2.starstalk.io

    steps:
      - name: Checkout ai_infra (Helm charts only — no private code)
        uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG_HOMELAB }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Refresh Vault credentials in starstalk-dev (shared with v1)
        env:
          VAULT_ROLE_ID:       ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID:     ${{ secrets.VAULT_SECRET_ID }}
          VAULT_DEV_ROLE_ID:   ${{ secrets.VAULT_DEV_ROLE_ID }}
          VAULT_DEV_SECRET_ID: ${{ secrets.VAULT_DEV_SECRET_ID }}
        run: |
          DEV_ROLE_ID="${VAULT_DEV_ROLE_ID:-${VAULT_ROLE_ID}}"
          DEV_SECRET_ID="${VAULT_DEV_SECRET_ID:-${VAULT_SECRET_ID}}"

          kubectl create secret generic starstalk-vault-dev \
            --from-literal=VAULT_ROLE_ID="${DEV_ROLE_ID}" \
            --from-literal=VAULT_SECRET_ID="${DEV_SECRET_ID}" \
            --namespace starstalk-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy v2 → dev
        run: |
          helm upgrade --install starstalk-dev-v2 helm/starstalk \
            --namespace starstalk-dev \
            --set "image.tag=${{ env.IMAGE_TAG }}" \
            -f helm/starstalk/values-dev-v2.yaml \
            --wait --timeout 3m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/starstalk-dev-v2 -n starstalk-dev --timeout=120s
          kubectl get pods -n starstalk-dev -l app.kubernetes.io/instance=starstalk-dev-v2 -o wide

  # ── Deploy v2 (Rust) to prod (manual approval required) ──────────────────────
  deploy-prod-v2:
    if: >
      (github.event_name == 'repository_dispatch' && github.event.action == 'deploy-prod-v2') ||
      (github.event_name == 'workflow_dispatch'   && inputs.environment == 'prod-v2')
    runs-on: [self-hosted, proxmox]
    environment:
      name: prod
      url: https://api-v2.starstalk.io

    steps:
      - name: Checkout ai_infra (Helm charts only — no private code)
        uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG_HOMELAB }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Refresh Vault credentials in starstalk (shared with v1)
        env:
          VAULT_ROLE_ID:    ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID:  ${{ secrets.VAULT_SECRET_ID }}
        run: |
          kubectl create secret generic starstalk-vault \
            --from-literal=VAULT_ROLE_ID="${VAULT_ROLE_ID}" \
            --from-literal=VAULT_SECRET_ID="${VAULT_SECRET_ID}" \
            --namespace starstalk \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy v2 → prod
        run: |
          helm upgrade --install starstalk-v2 helm/starstalk \
            --namespace starstalk \
            --set "image.tag=${{ env.IMAGE_TAG }}" \
            -f helm/starstalk/values-homelab-v2.yaml \
            --wait --timeout 3m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/starstalk-v2 -n starstalk --timeout=120s
          kubectl get pods -n starstalk -l app.kubernetes.io/instance=starstalk-v2 -o wide
