# Homelab overrides — 2 replicas spread across both Proxmox hosts
replicaCount: 2

image:
  repository: 192.168.0.77:5000/starstalk-backend
  pullPolicy: Always

service:
  type: ClusterIP
  port: 443
  targetPort: 443

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # Backend serves HTTPS on 443 — tell Traefik to connect via HTTPS
    traefik.ingress.kubernetes.io/service.serversscheme: https
  hosts:
    - host: api.starstalk.io
      paths:
        - path: /
          pathType: Prefix
    - host: starstalk.io
      paths:
        - path: /
          pathType: Prefix
    - host: www.starstalk.io
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Spread pods across different physical nodes so a single Proxmox host
# failure takes down at most one replica.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: starstalk
          topologyKey: kubernetes.io/hostname

# Prod backend binds on 443 (HTTPS) — Vault provides ENVIRONMENT=prod.
# TCP probe on 443 avoids the need to validate TLS certs in the probe.
livenessProbe:
  httpGet: null
  tcpSocket:
    port: 443
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet: null
  tcpSocket:
    port: 443
  initialDelaySeconds: 5
  periodSeconds: 10

env:
  LOG_LEVEL: "info"
  PORT: "8080"
  ENVIRONMENT: "homelab"
  INFRA: "k8s"

# Vault AppRole creds are stored in k8s Secret "starstalk-vault"
# (created/refreshed by the deploy workflow on every release).
secretEnv:
  VAULT_ROLE_ID:
    secretName: starstalk-vault
    key: VAULT_ROLE_ID
  VAULT_SECRET_ID:
    secretName: starstalk-vault
    key: VAULT_SECRET_ID
