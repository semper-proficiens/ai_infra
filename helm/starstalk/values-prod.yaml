# Production overrides — 3 replicas, cloud load balancer, TLS
replicaCount: 3

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  annotations:
    # AWS ALB example — adjust for your cloud provider
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.starstalk.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: starstalk-tls
      hosts:
        - api.starstalk.io

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  LOG_LEVEL: "warn"
  PORT: "8080"
  ENVIRONMENT: "production"
