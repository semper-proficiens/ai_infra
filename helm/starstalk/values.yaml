# Default values — override with values-homelab.yaml or values-prod.yaml

replicaCount: 1

image:
  repository: ghcr.io/starstalk/backend
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart.appVersion

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: starstalk.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  # Override in values-homelab/values-prod or via --set
  LOG_LEVEL: "info"
  PORT: "8080"

# Secret env vars — mount from Kubernetes Secrets
secretEnv:
  # Key: env var name, Value: secret name and key
  # DATABASE_URL:
  #   secretName: starstalk-db-credentials
  #   key: url
  {}

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
