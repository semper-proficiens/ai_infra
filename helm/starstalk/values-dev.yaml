# Dev environment overrides
# Deployed to namespace: starstalk-dev
# Triggered by: push to dev branch in starstalk repo

replicaCount: 1

image:
  repository: 192.168.0.77:5000/starstalk-backend
  pullPolicy: Always   # always pull so 'dev' tag stays current

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts:
    - host: api-dev.starstalk.io
      paths:
        - path: /
          pathType: Prefix

# No HPA for dev — fixed single replica keeps cost and noise down
autoscaling:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# No anti-affinity for dev — fine to co-locate on any node
affinity: {}

livenessProbe:
  httpGet:
    path: /healthcheck
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /healthcheck
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

env:
  LOG_LEVEL: "debug"
  PORT: "8080"
  ENVIRONMENT: "dev"
  INFRA: "k8s"
  DB_HOST: "starstalk-pg-dev-rw.starstalk-dev.svc.cluster.local"
  DB_PORT: "5432"
  VAULT_SECRET_PATH: "starstalk-dev"

# Vault creds — deploy workflow creates this secret from GitHub Secrets.
# Uses VAULT_DEV_ROLE_ID/VAULT_DEV_SECRET_ID if set (dev AppRole, reads secret/starstalk-dev).
# Falls back to VAULT_ROLE_ID/VAULT_SECRET_ID (prod AppRole, reads secret/starstalk).
secretEnv:
  VAULT_ROLE_ID:
    secretName: starstalk-vault-dev
    key: VAULT_ROLE_ID
  VAULT_SECRET_ID:
    secretName: starstalk-vault-dev
    key: VAULT_SECRET_ID
