# Dev environment overrides
# Deployed to namespace: starstalk-dev
# Triggered by: push to dev branch in starstalk repo

replicaCount: 1

image:
  repository: 192.168.0.77:5000/starstalk-backend
  pullPolicy: Always   # always pull so 'dev' tag stays current

service:
  type: ClusterIP
  port: 443
  targetPort: 443

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # Backend serves HTTPS on 443 — tell Traefik to connect via HTTPS
    traefik.ingress.kubernetes.io/service.serversscheme: https
  hosts:
    - host: api-dev.starstalk.io
      paths:
        - path: /
          pathType: Prefix

# No HPA for dev — fixed single replica keeps cost and noise down
autoscaling:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# No anti-affinity for dev — fine to co-locate on any node
affinity: {}

# NOTE: Until setup-vault-dev-path.sh is run on the Vault VM and
# VAULT_DEV_ROLE_ID/VAULT_DEV_SECRET_ID are added to GitHub Secrets,
# dev uses the same AppRole as prod (reads secret/starstalk → ENVIRONMENT=prod).
# After Vault setup: service port will be reverted to 8080, probes to httpGet,
# and secretEnv will switch to starstalk-vault-dev automatically via deploy workflow.

# TEMPORARY: TCP probe on 443 while dev AppRole reads secret/starstalk (ENVIRONMENT=prod).
# Reverts to httpGet on 8080 once dev AppRole reads secret/starstalk-dev.
livenessProbe:
  httpGet: null
  tcpSocket:
    port: 443
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet: null
  tcpSocket:
    port: 443
  initialDelaySeconds: 5
  periodSeconds: 10

env:
  LOG_LEVEL: "debug"
  PORT: "8080"
  ENVIRONMENT: "dev"
  INFRA: "k8s"
  DB_HOST: "starstalk-pg-dev-rw.starstalk-dev.svc.cluster.local"
  DB_PORT: "5432"

# Vault creds — deploy workflow creates this secret from GitHub Secrets.
# Uses VAULT_DEV_ROLE_ID/VAULT_DEV_SECRET_ID if set (dev AppRole, reads secret/starstalk-dev).
# Falls back to VAULT_ROLE_ID/VAULT_SECRET_ID (prod AppRole, reads secret/starstalk).
secretEnv:
  VAULT_ROLE_ID:
    secretName: starstalk-vault-dev
    key: VAULT_ROLE_ID
  VAULT_SECRET_ID:
    secretName: starstalk-vault-dev
    key: VAULT_SECRET_ID
