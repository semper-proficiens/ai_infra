# ProvisionToken for tbot kubernetes join method
#
# Apply to Teleport auth server via:
#   tctl create -f /tmp/tbot-token.yaml
#
# This token never expires and validates the k3s ServiceAccount JWT
# against the k3s cluster API — no stored secret anywhere.
kind: token
version: v2
metadata:
  name: tbot-k8s
spec:
  roles: [Bot]
  join_method: kubernetes
  bot_name: claude-bot-k8s
  kubernetes:
    allow:
      - service_account: "teleport:tbot"   # namespace:serviceaccount
    # type: static_jwks — Teleport auth server is NOT inside k3s, so it cannot
    # use in-cluster config to validate service account JWTs. Providing the k3s
    # signing keys here lets Teleport validate tokens without API access.
    type: static_jwks
    static_jwks:
      # The k3s SA token audience is not the Teleport cluster name, so we
      # explicitly allow the audiences present in the default SA token.
      allowed_audiences:
        - https://kubernetes.default.svc.cluster.local
        - k3s
      jwks: |
