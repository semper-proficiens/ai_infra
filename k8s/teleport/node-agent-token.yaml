# ProvisionToken for k3s node SSH agents (kubernetes join method)
#
# Apply ONCE on the Teleport auth server:
#   tsh ssh root@tp-cluster-node "tctl create -f /tmp/node-agent-token.yaml"
# or copy the file first:
#   tsh scp k8s/teleport/node-agent-token.yaml root@tp-cluster-node:/tmp/
#   tsh ssh root@tp-cluster-node "tctl create -f /tmp/node-agent-token.yaml"
#
# Uses the same k3s JWKS as the tbot token — no stored secret, auto-validates
# service account JWTs from the teleport-node ServiceAccount.
kind: token
version: v2
metadata:
  name: k3s-node-agent
spec:
  roles: [Node]
  join_method: kubernetes
  kubernetes:
    allow:
      - service_account: "teleport:teleport-node"
    type: static_jwks
    static_jwks:
      allowed_audiences:
        - https://kubernetes.default.svc.cluster.local
        - k3s
      jwks: |
