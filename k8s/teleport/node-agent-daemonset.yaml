# Teleport SSH node agent DaemonSet
#
# Registers each k3s node (control + workers) as an SSH target in Teleport.
# Uses kubernetes join method — no stored join token, no tp-cluster-node access needed
# after the one-time ProvisionToken creation.
#
# Prerequisites:
#   1. tctl create -f k8s/teleport/node-agent-token.yaml  (once, on auth server)
#   2. kubectl apply -f k8s/teleport/node-agent-daemonset.yaml
#
# After deployment, nodes appear in Teleport as:
#   k3s-control (192.168.0.80), k3s-worker-0 (192.168.0.81), k3s-worker-1 (192.168.0.82)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: teleport-node
  namespace: teleport
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: teleport-node-config
  namespace: teleport
data:
  teleport.yaml: |
    version: v3
    teleport:
      nodename: NODE_NAME_PLACEHOLDER
      data_dir: /var/lib/teleport
      proxy_server: teleport.starstalk.io:443
      join_params:
        method: kubernetes
        token_name: k3s-node-agent
    ssh_service:
      enabled: true
      labels:
        env: k3s
        cluster: homelab
    auth_service:
      enabled: false
    proxy_service:
      enabled: false
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: teleport-node
  namespace: teleport
spec:
  selector:
    matchLabels:
      app: teleport-node
  template:
    metadata:
      labels:
        app: teleport-node
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: teleport-node
      tolerations:
        - effect: NoSchedule
          operator: Exists
      initContainers:
        - name: config-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sed "s/NODE_NAME_PLACEHOLDER/${NODE_NAME}/" \
                /config-template/teleport.yaml > /config/teleport.yaml
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /config
      containers:
        - name: teleport-node
          image: public.ecr.aws/gravitational/teleport-distroless:15.5.4
          args:
            - --config=/etc/teleport/teleport.yaml
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Point teleport at projected SA token (audience=Teleport cluster name)
            # so static_jwks audience validation passes.
            - name: KUBERNETES_TOKEN_PATH
              value: /var/run/secrets/tokens/node-token
          volumeMounts:
            - name: config
              mountPath: /etc/teleport
            - name: data
              mountPath: /var/lib/teleport
            - name: node-token
              mountPath: /var/run/secrets/tokens
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config-template
          configMap:
            name: teleport-node-config
        - name: config
          emptyDir: {}
        - name: data
          hostPath:
            path: /var/lib/teleport-node
            type: DirectoryOrCreate
        - name: node-token
          projected:
            sources:
              - serviceAccountToken:
                  path: node-token
                  expirationSeconds: 600
                  audience: ssj2-erniepy-Standard-PC-i440FX-PIIX-1996
