# Promtail values — log shipping agent (DaemonSet, one pod per k3s node)
#
# Ships all pod logs from all namespaces to Loki gateway.
# Install/upgrade: make setup-loki  (runs helm upgrade --install promtail ... -f this file)

config:
  clients:
    - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

  snippets:
    pipelineStages:
      - cri: {}
      # Drop Traefik/k3s health-probe TLS handshake EOF noise — these are INFO-level
      # log lines generated by the k3s internal health probe hitting the TLS port.
      # ~100s of lines/hour, never actionable.
      - drop:
          expression: ".*TLS handshake error.*"
          drop_counter_reason: tls_eof_noise

resources:
  requests:
    memory: 64Mi
  limits:
    memory: 128Mi
