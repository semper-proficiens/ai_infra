# kube-prometheus-stack values for homelab
# Install: helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --create-namespace \
#   -f k8s/monitoring/prometheus-stack-values.yaml

grafana:
  enabled: true
  adminPassword: ""   # Set via: --set grafana.adminPassword=<password>
                      # Or create secret before install (see setup-k8s.sh)
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

  # Disable init-chown-data — the PVC already has correct ownership from initial
  # install; the chown init container fails on upgrade due to root permission
  # restrictions in newer busybox images on an already-populated PVC.
  initChownData:
    enabled: false

  # Auth proxy — lets CF Access auto-login users at monitor.starstalk.io.
  # CF Access sets Cf-Access-Authenticated-User-Email after Google auth.
  # grafana.starstalk.io (no CF Access header) falls back to Grafana login form.
  grafana.ini:
    auth.proxy:
      enabled: true
      header_name: Cf-Access-Authenticated-User-Email
      header_property: email
      auto_sign_up: true
      default_role: Viewer
    # SMTP — credentials injected from Secret/grafana-smtp-credentials
    # via extraSecretMounts below. Password read from env var GF_SMTP_PASSWORD.
    smtp:
      enabled: true
      host: smtp.gmail.com:587
      user: ${GF_SMTP_USER}
      password: ${GF_SMTP_PASSWORD}
      from_address: ${GF_SMTP_USER}
      from_name: Starstalk Alerts
      startTLS_policy: MandatoryStartTLS

  # Mount smtp credentials secret as env vars.
  # Secret/grafana-smtp-credentials must exist before helm upgrade:
  #   make setup-alert-email
  envFromSecret: grafana-smtp-credentials

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      # Route on both HTTP (from CF Tunnel) and HTTPS entrypoints
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    hosts:
      - grafana.starstalk.io
      - monitor.starstalk.io
    paths:
      - /

  # Pre-load dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      cnpg:
        gnetId: 20417    # CloudNativePG official dashboard
        revision: 1
        datasource: Prometheus
      k8s-views-namespaces:
        gnetId: 15760    # Kubernetes / Views / Namespaces — dev vs prod at a glance
        revision: 35
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15761    # Kubernetes / Views / Pods — per-pod CPU/memory/restarts
        revision: 16
        datasource: Prometheus
      k8s-workloads-namespace:
        gnetId: 13659    # Kubernetes / Compute Resources / Namespace (Workloads)
        revision: 3
        datasource: Prometheus

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 10Gi

    # Scrape CloudNativePG PodMonitors
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}

alertmanager:
  enabled: true
  # Full Alertmanager config (routing + receivers with real email) lives in a
  # k8s Secret to keep PII and SMTP credentials out of git.
  # Secret/alertmanager-config-email must exist before helm upgrade:
  #   make setup-alert-email
  alertmanagerSpec:
    configSecret: alertmanager-config-email
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 1Gi

# Resource limits — keep homelab footprint manageable
kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false                    # k3s doesn't expose etcd metrics by default
    general: true
    kubeApiserverAvailability: true
    kubePrometheusGeneral: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    node: true
    # k3s runs these components as embedded processes — no separate metrics endpoints.
    # Disabling prevents persistent critical spam from the default rules.
    kubeControllerManager: false   # KubeControllerManagerDown: not scraped in k3s
    kubeScheduler: false           # KubeSchedulerDown: not scraped in k3s
    kubeProxy: false               # KubeProxyDown: k3s uses kube-router, not kube-proxy
