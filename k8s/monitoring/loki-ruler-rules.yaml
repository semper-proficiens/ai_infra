apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-ruler-rules
  namespace: monitoring
data:
  # Loki ruler evaluates these LogQL alert rules and fires directly to Alertmanager.
  # Tenant directory must match auth_enabled=false tenant: "fake"
  starstalk-log-alerts.yaml: |
    groups:
      - name: starstalk.log-errors
        interval: 1m
        rules:
          - alert: StarstalkHighErrorLogRate
            expr: |
              sum(count_over_time(
                {namespace="starstalk", container="starstalk"}
                | json | level="ERROR" [5m]
              )) > 10
            for: 2m
            labels:
              severity: warning
              team: starstalk
              namespace: starstalk
            annotations:
              summary: "Prod error log spike — {{ $value | printf \"%.0f\" }} errors in 5m"
              description: >
                The starstalk prod backend logged more than 10 ERROR-level messages
                in the last 5 minutes. Open Grafana → Starstalk Logs dashboard to investigate.
