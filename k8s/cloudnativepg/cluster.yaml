---
# CloudNativePG Cluster — starstalk PostgreSQL
# Primary on one k3s worker, standby on the other (different Proxmox hosts).
# Automatic failover: if the primary pod crashes, CloudNativePG promotes the
# standby within ~30s without any manual intervention.
#
# Before applying:
#   kubectl create secret generic starstalk-pg-superuser \
#     --from-literal=username=postgres \
#     --from-literal=password=<STRONG-PASSWORD> \
#     --namespace starstalk
#   kubectl create secret generic starstalk-pg-app \
#     --from-literal=username=starstalk \
#     --from-literal=password=<APP-PASSWORD> \
#     --namespace starstalk
#
# Backup credentials (create once via setup-cnpg-backup.sh):
#   kubectl create secret generic starstalk-pg-backup-s3 \
#     --from-literal=ACCESS_KEY_ID=<minio-user> \
#     --from-literal=ACCESS_SECRET_KEY=<minio-password> \
#     --namespace starstalk
#
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: starstalk-pg
  namespace: starstalk
spec:
  instances: 2

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      wal_level: logical

  bootstrap:
    initdb:
      database: starstalk
      owner: starstalk
      secret:
        name: starstalk-pg-app

  superuserSecret:
    name: starstalk-pg-superuser

  storage:
    size: 20Gi
    storageClass: local-path   # k3s default — data lives on the node's disk

  # Spread primary and standby across different physical nodes.
  # When k3s-worker-0 (ssj1) and k3s-worker-1 (ssj2) are the only workers,
  # this guarantees each instance is on a different Proxmox host.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: preferred

  # Continuous WAL archiving + scheduled base backups → k8s MinIO (minio namespace)
  # Recovery: kubectl cnpg restore starstalk-pg --backup <name>
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://starstalk-pg-backups/
      endpointURL: http://minio.minio.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: starstalk-pg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: starstalk-pg-backup-s3
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        immediateCheckpoint: false

  # Monitoring: CloudNativePG exposes Prometheus metrics on port 9187
  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
